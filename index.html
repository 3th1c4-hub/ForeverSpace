<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V0YAGER_1</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/suneditor/2.46.3/css/suneditor.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/suneditor/2.46.3/suneditor.min.js"></script>
<style>
@font-face {
  font-family: 'GmarketSansMedium';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
  font-weight: normal; font-style: normal;
}

:root {
  --bg: #151515;
  --text: #F4EFE7;
  --text-dim: #888;
  --accent: #967D5E;
  --border: #F4EFE7;
  --card-bg: rgba(21,21,21,0.8);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh; background: var(--bg); color: var(--text);
  font-family: 'Courier New', monospace;
  overflow-x: hidden; overflow-y: auto;
  opacity: 0; animation: fadeIn 1s ease-in forwards;
}

@keyframes fadeIn { from{opacity:0}to{opacity:1} }
@keyframes blink { 0%,100%{opacity:0}50%{opacity:1} }
@keyframes spin { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }

::selection { background: var(--accent); color: var(--bg); }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-thumb { background: var(--accent); }
::-webkit-scrollbar-track { background: transparent; }

/* ===== CORNER LABELS ===== */
.corner-label { position: fixed; font-size: 0.6rem; opacity: 0.5; z-index: 1; pointer-events: none; color: var(--text); }

/* ===== LAYOUT ===== */
.container {
  max-width: 1100px; width: 100%; margin: 0 auto;
  padding: 75px 2rem 2rem; min-height: 100vh;
}

.main-card {
  background: rgba(21,21,21,0.5); padding: 2rem;
  border-radius: 1rem; width: 100%;
}

.top-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 1.5rem; margin-bottom: 0; flex-wrap: wrap;
}

.left-col { flex: 1; min-width: 300px; }
.right-col { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 1rem; }

/* ===== SIGNAL & TITLE ===== */
.signal {
  font-size: 0.85rem; opacity: 0; animation: blink 5s ease-in-out infinite;
  margin-bottom: 0.8rem; color: var(--text);
}

.site-title {
  font-family: 'GmarketSansMedium', monospace;
  font-size: 2.5rem; font-weight: bold; line-height: 1.2;
  margin-bottom: 2rem; cursor: pointer; transition: color 0.3s;
}
.site-title:hover { color: var(--accent); }

/* ===== CATEGORIES ===== */
.categories { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 2rem; }
.cat-btn {
  background: none; border: none; color: var(--text); font-size: 1.05rem;
  text-align: left; cursor: pointer; font-family: inherit; font-weight: bold;
  transition: color 0.3s; padding: 0.2rem 0.4rem; width: fit-content;
  display: flex; align-items: center; gap: 8px;
}
.cat-btn:hover { color: var(--accent); }
.cat-btn:active { background: var(--accent); color: var(--bg); }

.cat-edit-btn {
  background: none; border: none; color: #555; cursor: pointer; font-size: 0.7rem;
  display: none; transition: 0.2s; padding: 2px 4px;
}
.cat-edit-btn:hover { color: var(--accent); }
.cat-edit-btn.del:hover { color: #c44; }
body.admin-mode .cat-btn:hover .cat-edit-btn { display: inline; }

.cat-edit-input {
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  color: var(--text); font-family: inherit; font-size: 1.05rem; font-weight: bold;
  outline: none; width: 160px; padding: 0;
}

/* Sub categories */
.sub-list { margin-left: 24px; margin-bottom: 8px; }
.sub-btn {
  background: none; border: none; color: var(--text-dim); font-size: 0.88rem;
  text-align: left; cursor: pointer; font-family: inherit; padding: 3px 4px;
  transition: color 0.2s; display: flex; align-items: center; gap: 6px; width: fit-content;
}
.sub-btn:hover { color: var(--text); }
.sub-edit-btn {
  background: none; border: none; color: #444; cursor: pointer; font-size: 0.65rem;
  display: none; padding: 1px 3px; transition: 0.2s;
}
.sub-edit-btn:hover { color: var(--accent); }
.sub-edit-btn.del:hover { color: #c44; }
body.admin-mode .sub-btn:hover .sub-edit-btn { display: inline; }

.add-cat-btn {
  background: none; border: 1px dashed #333; color: #555;
  font-family: inherit; font-size: 0.75rem; padding: 4px 10px;
  cursor: pointer; transition: 0.2s; margin-top: 6px; width: fit-content;
}
.add-cat-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== STATUS MESSAGES ===== */
.status-messages { margin-bottom: 1.5rem; }
.status-messages div { font-size: 0.75rem; line-height: 1.9; opacity: 0.7; }

/* ===== D-DAY ===== */
.dday { font-weight: bold; line-height: 1.4; margin-bottom: 2rem; }
.dday .label { font-size: 0.8rem; font-style: italic; opacity: 0.7; }
.dday .big { font-size: 2rem; letter-spacing: 2px; }

/* ===== PLAYER ===== */
.player {
  border: 1px solid var(--border); border-radius: 1rem;
  padding: 1rem; background: var(--card-bg);
}
.player-inner { display: flex; align-items: center; gap: 1rem; }
.record-img {
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #555, #222, #111);
  display: flex; align-items: center; justify-content: center;
  animation: spin 8s linear infinite; flex-shrink: 0;
  border: 1px solid #333;
}
.record-img.paused { animation-play-state: paused; }
.record-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

.player-info { flex: 1; min-width: 0; }
.now-playing-label { font-size: 0.75rem; color: var(--text-dim); }
.track-name { font-size: 0.95rem; font-weight: bold; margin: 4px 0 8px; }

input[type="range"] {
  -webkit-appearance: none; height: 4px; background: #444;
  border-radius: 2px; width: 100%; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; height: 12px; width: 12px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
}

.controls { display: flex; justify-content: center; gap: 1rem; margin-top: 8px; }
.player-btn {
  background: none; border: none; font-size: 1.1rem;
  color: var(--text); cursor: pointer; padding: 4px 8px; transition: 0.2s;
}
.player-btn:hover { transform: scale(1.15); color: var(--accent); }

/* YouTube BGM */
.yt-player-area { margin-top: 8px; }
.yt-toggle-btn {
  background: none; border: 1px solid #333; color: var(--text-dim);
  font-family: inherit; font-size: 0.65rem; padding: 3px 8px;
  cursor: pointer; transition: 0.2s; letter-spacing: 0.5px;
}
.yt-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== RECENT DATA ===== */
.recent-data {
  border: 1px solid var(--border); border-radius: 1rem;
  padding: 1rem; background: var(--card-bg);
}
.recent-data-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; }
.recent-item {
  font-size: 0.78rem; padding: 4px 0; color: var(--text-dim);
  cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03);
  display: flex; align-items: center; gap: 5px;
}
.recent-item:hover { color: var(--text); }

/* ===== CHARACTER THUMBNAILS ===== */
.char-thumbs { display: flex; gap: 6px; flex-wrap: wrap; }
.char-thumb {
  width: 48px; height: 48px; background: #222; cursor: pointer;
  overflow: hidden; transition: all 0.3s; border: 1px solid transparent;
}
.char-thumb:hover { border-color: var(--accent); transform: translateY(-3px); }
.char-thumb img { width: 100%; height: 100%; object-fit: cover; }
.char-thumb-emoji { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 1.2rem; }
.char-more-btn {
  width: 36px; height: 48px; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 0.8rem; cursor: pointer; letter-spacing: 2px;
}
.char-more-btn:hover { color: var(--text); }

/* ===== CHARACTER FULL SECTION ===== */
.char-section {
  margin-top: 1.5rem; padding: 1.5rem; background: var(--card-bg);
  border: 1px solid #333; border-radius: 0.5rem;
  display: none; animation: fadeIn 0.4s;
}
.char-section.open { display: block; }
.char-section-header {
  font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1.5px;
  margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;
}
.char-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 0.75rem; }
.char-close:hover { color: var(--text); }

.char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.char-card {
  background: rgba(0,0,0,0.4); border: 1px solid #333; cursor: pointer;
  transition: all 0.3s; text-align: center; overflow: hidden; border-radius: 4px;
}
.char-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.char-card-img {
  width: 100%; aspect-ratio: 1; background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; position: relative; overflow: hidden;
}
.char-card-img img { width: 100%; height: 100%; object-fit: cover; }
.char-card-rank {
  position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.7);
  font-size: 0.5rem; padding: 2px 5px; letter-spacing: 1px;
}
.char-card-body { padding: 8px 6px 10px; }
.char-card-name { font-size: 0.8rem; font-weight: bold; margin-bottom: 2px; }
.char-card-class { font-size: 0.58rem; color: var(--text-dim); }

.char-img-upload {
  position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.7);
  color: var(--text-dim); border: 1px solid #444; width: 20px; height: 20px;
  font-size: 0.55rem; cursor: pointer; display: none; align-items: center; justify-content: center;
}
body.admin-mode .char-card:hover .char-img-upload { display: flex; }
.char-img-upload:hover { color: var(--accent); border-color: var(--accent); }

/* ===== CHAR PROFILE MODAL ===== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.88); backdrop-filter: blur(6px);
  z-index: 99999; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #111; border: 1px solid #333; width: 90%; max-width: 380px;
  overflow: hidden; animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1} }

.modal-banner {
  height: 100px; background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #151515);
  display: flex; align-items: center; justify-content: center; position: relative;
}
.modal-avatar {
  width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center; font-size: 2rem;
  background: #111; overflow: hidden;
}
.modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
.modal-close-btn {
  position: absolute; top: 8px; right: 8px; background: none;
  border: 1px solid #333; color: var(--text-dim); width: 24px; height: 24px;
  cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
}
.modal-close-btn:hover { color: var(--text); border-color: var(--text); }
.modal-body { padding: 18px 20px 22px; }
.modal-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 2px; }
.modal-class { font-size: 0.72rem; color: var(--accent); margin-bottom: 12px; letter-spacing: 0.5px; }
.modal-bio { font-size: 0.82rem; color: var(--text-dim); line-height: 1.7; padding-top: 10px; border-top: 1px solid #222; font-family: 'Pretendard', sans-serif; }

/* ===== BOARD AREA ===== */
.board-area { display: none; animation: fadeIn 0.4s; margin-top: -0.5rem; }
.board-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;
}
.board-header h2 { font-size: 1.3rem; font-weight: 400; letter-spacing: 1px; }
.board-back-btn {
  background: none; border: 1px solid #333; color: var(--text-dim);
  font-family: inherit; font-size: 0.7rem; padding: 4px 10px;
  cursor: pointer; transition: 0.2s;
}
.board-back-btn:hover { border-color: var(--text); color: var(--text); }

.view-toggle {
  background: none; border: 1px solid #333; color: var(--text-dim);
  font-family: inherit; font-size: 0.65rem; padding: 3px 10px;
  cursor: pointer; margin-right: 8px; transition: 0.2s;
}
.view-toggle:hover { border-color: var(--text); color: var(--text); }

.write-btn {
  background: var(--accent); color: var(--bg); border: none; padding: 5px 12px;
  cursor: pointer; font-family: 'Pretendard', sans-serif; font-weight: 700; font-size: 0.78rem; transition: 0.2s;
}
.write-btn:hover { opacity: 0.85; }

/* Write form */
.write-form {
  background: rgba(0,0,0,0.5); padding: 20px; border: 1px solid #333;
  margin-bottom: 20px; display: none; border-radius: 4px;
}
.write-form input[type="text"] {
  width: 100%; background: var(--bg); border: 1px solid #333; color: var(--text);
  padding: 10px; margin-bottom: 10px; font-family: 'Pretendard',sans-serif; font-size: 0.9rem; outline: none;
}
.write-form input[type="text"]:focus { border-color: var(--accent); }
.checkbox-row { display: flex; gap: 16px; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; }
.checkbox-label { color: var(--text-dim); font-size: 0.78rem; display: flex; align-items: center; gap: 5px; cursor: pointer; font-family: 'Pretendard',sans-serif; }

/* SunEditor dark */
.sun-editor { border-color: #333 !important; background: var(--bg) !important; }
.se-wrapper-inner { background: var(--bg) !important; color: var(--text) !important; font-family: 'Pretendard',sans-serif; }
.se-toolbar { outline: 1px solid #333 !important; background: rgba(0,0,0,0.9) !important; }
.sun-editor .se-btn-tray { background: #1a1a1a !important; }
.sun-editor .se-dialog .se-dialog-inner { background: #1a1a1a !important; color: var(--text) !important; border: 1px solid #333 !important; }
.sun-editor input, .sun-editor select { background: var(--bg) !important; color: var(--text) !important; border: 1px solid #333 !important; }

/* Post cards */
.post-list { display: flex; flex-direction: column; gap: 16px; padding-bottom: 60px; }
.post-list.gallery-mode { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }
.post-list.gallery-mode .post-card { max-height: 300px; overflow-y: auto; }

.post-card {
  background: var(--card-bg); border: 1px solid #333;
  padding: 22px; transition: 0.3s; border-radius: 4px;
}
.post-card:hover { border-color: rgba(255,255,255,0.15); }
.post-card.notice { border-color: var(--accent); }
.notice-badge {
  display: inline-block; background: var(--accent); color: var(--bg);
  padding: 2px 7px; font-size: 0.55rem; margin-right: 6px;
  font-weight: bold; letter-spacing: 1px; vertical-align: middle;
}
.post-header { display: flex; justify-content: space-between; margin-bottom: 14px; border-bottom: 1px solid #222; padding-bottom: 10px; }
.post-title-text { font-size: 1.05rem; font-weight: 600; flex: 1; font-family: 'Pretendard',sans-serif; }
.post-date { font-size: 0.68rem; color: var(--text-dim); text-align: right; }
.post-body { color: var(--text-dim); line-height: 1.8; font-size: 0.88rem; font-family: 'Pretendard',sans-serif; }
.post-body a { color: var(--accent); }
.post-body img { max-width: 100%; border-radius: 4px; margin: 10px 0; }
.post-body blockquote { border-left: 2px solid var(--accent); padding: 10px 14px; background: rgba(255,255,255,0.02); margin: 10px 0; }
.post-body table { border-collapse: collapse; width: 100%; }
.post-body th, .post-body td { border: 1px solid #333; padding: 8px; }
.post-body details { background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 4px; padding: 8px; margin: 10px 0; }
.post-body details summary { font-weight: bold; cursor: pointer; color: var(--text); }

.post-actions { margin-top: 14px; text-align: right; display: none; border-top: 1px dashed #333; padding-top: 10px; }
body.admin-mode .post-actions { display: block; }
.post-link-btn {
  background: transparent; border: 1px solid #333; color: var(--text-dim);
  padding: 2px 7px; font-size: 0.6rem; cursor: pointer; font-family: inherit; transition: 0.2s;
}
.post-link-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== SETTINGS MODAL ===== */
.settings-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.88); z-index: 999999; justify-content: center; align-items: center;
}
.settings-overlay.show { display: flex; }
.settings-box {
  background: #111; border: 1px solid #333; width: 480px; max-width: 94%;
  max-height: 88vh; overflow-y: auto; padding: 28px; animation: slideUp 0.3s;
}
.settings-box::-webkit-scrollbar { width: 4px; }
.settings-box::-webkit-scrollbar-thumb { background: #333; }
.settings-box h2 { font-size: 0.85rem; letter-spacing: 2px; text-align: center; margin-bottom: 18px; font-weight: 400; text-transform: uppercase; color: var(--text-dim); }
.s-group { margin-bottom: 10px; }
.s-group label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 3px; font-family: 'Pretendard',sans-serif; }
.s-group input, .s-group textarea, .s-group select {
  width: 100%; padding: 7px 8px; background: var(--bg); border: 1px solid #333;
  color: var(--text); font-family: 'Pretendard',sans-serif; font-size: 0.82rem; outline: none;
}
.s-group input:focus, .s-group textarea:focus { border-color: var(--accent); }
.s-group input[type="color"] { height: 32px; padding: 2px; cursor: pointer; }
.s-hr { border: 0; border-bottom: 1px solid #222; margin: 14px 0; }
.s-section-title { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
.s-btn-row { display: flex; justify-content: space-between; gap: 8px; margin-top: 18px; }
.s-btn-save { background: var(--accent); color: var(--bg); border: none; padding: 8px 20px; cursor: pointer; font-weight: 700; font-family: 'Pretendard',sans-serif; font-size: 0.8rem; }
.s-btn-cancel { background: transparent; border: 1px solid #333; color: var(--text-dim); padding: 8px 20px; cursor: pointer; font-family: 'Pretendard',sans-serif; font-size: 0.8rem; }
.s-btn-cancel:hover { border-color: var(--text); color: var(--text); }

/* Char settings */
.char-setting-card {
  background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 10px; margin-bottom: 8px; position: relative;
}
.char-del-btn { position: absolute; top: 5px; right: 7px; background: none; border: none; color: #c44; cursor: pointer; font-size: 0.75rem; }
.char-add-btn {
  background: none; border: 1px dashed #333; color: #555;
  width: 100%; padding: 6px; cursor: pointer; font-family: 'Pretendard',sans-serif; font-size: 0.75rem; margin-bottom: 12px;
}
.char-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== LOGIN ===== */
.login-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.88); z-index: 999999; justify-content: center; align-items: center;
}
.login-overlay.show { display: flex; }
.login-box {
  background: #111; border: 1px solid #333; width: 320px; padding: 30px; animation: slideUp 0.3s;
}
.login-box h2 { font-size: 0.9rem; letter-spacing: 2px; text-align: center; margin-bottom: 20px; font-weight: 400; text-transform: uppercase; }
.login-box input[type="password"] {
  width: 100%; background: rgba(255,255,255,0.9); color: #000; border: none;
  padding: 10px; font-weight: bold; margin-bottom: 16px; font-size: 0.9rem;
}
.login-btn-row { display: flex; justify-content: space-between; gap: 8px; }
.login-ok { background: var(--accent); color: var(--bg); border: none; padding: 9px 22px; cursor: pointer; font-weight: 700; font-size: 0.8rem; }
.login-cancel { background: transparent; border: 1px solid #333; color: var(--text-dim); padding: 9px 22px; cursor: pointer; font-size: 0.8rem; }
.login-cancel:hover { border-color: var(--text); color: var(--text); }

/* Admin only */
.admin-only { display: none !important; }
body.admin-mode .admin-only { display: inline-block !important; }
body.admin-mode div.admin-only, body.admin-mode button.admin-only { display: block !important; }

/* ===== TOP BUTTONS ===== */
.top-buttons {
  position: fixed; top: 12px; right: 20px; z-index: 100;
  display: flex; gap: 6px;
}
.top-btn {
  background: transparent; border: 1px solid #333; color: var(--text-dim);
  padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 0.6rem;
  letter-spacing: 1px; transition: 0.2s;
}
.top-btn:hover { border-color: var(--text); color: var(--text); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .top-row { flex-direction: column; }
  .right-col { width: 100%; }
  .char-grid { grid-template-columns: repeat(3, 1fr); }
  .container { padding: 60px 1rem 1rem; }
  .site-title { font-size: 1.8rem; }
}
</style>
</head>
<body>

<!-- Corner labels -->
<div class="corner-label" style="top:10px;left:10px;">600</div>
<div class="corner-label" style="top:50%;left:10px;transform:translateY(-50%);">300</div>
<div class="corner-label" style="bottom:10px;left:10px;">100</div>
<div class="corner-label" style="bottom:10px;left:50%;transform:translateX(-50%);">300</div>
<div class="corner-label" style="bottom:10px;right:10px;">600</div>

<!-- Top buttons -->
<div class="top-buttons">
  <button class="top-btn admin-only" onclick="openSettings()">settings</button>
  <button class="top-btn" id="loginBtn" onclick="openLogin()">login</button>
</div>

<!-- Hidden inputs -->
<input type="file" id="charImgInput" accept="image/*" style="display:none;">

<div class="container">
  <div class="main-card">
    <!-- TOP ROW: left + right -->
    <div class="top-row" id="mainDashboard">
      <div class="left-col">
        <div class="signal">receiving signal...</div>
        <div class="site-title" id="siteTitle" onclick="goMain()">Observatory of<br>Disappearing Things</div>

        <!-- Categories -->
        <div class="categories" id="catList"></div>

        <!-- Status messages -->
        <div class="status-messages" id="statusArea"></div>

        <!-- D-Day -->
        <div class="dday">
          <div class="label" id="ddayLabel">from the date of the voyage</div>
          <div class="big" id="ddayValue">D+3893</div>
        </div>

        <!-- Char section (toggled) -->
        <div class="char-section" id="charSection">
          <div class="char-section-header">
            <span>REPRESENTATIVES</span>
            <button class="char-close" onclick="toggleCharSection()">close</button>
          </div>
          <div class="char-grid" id="charGrid"></div>
        </div>
      </div>

      <div class="right-col">
        <!-- Player -->
        <div class="player">
          <div class="player-inner">
            <div class="record-img" id="recordImg"><div class="record-dot"></div></div>
            <div class="player-info">
              <div class="now-playing-label">> Now Playing<span id="dots">..</span></div>
              <div class="track-name" id="trackName">-</div>
              <input type="range" id="progress" value="0" min="0" max="100" step="1">
              <div class="controls">
                <button class="player-btn" onclick="prevTrack()">&#x226A;</button>
                <button class="player-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>
                <button class="player-btn" onclick="nextTrack()">&#x226B;</button>
              </div>
            </div>
          </div>
          <div class="yt-player-area" id="ytArea" style="display:none; margin-top:10px;"></div>
        </div>

        <!-- Recent Data -->
        <div class="recent-data">
          <div class="recent-data-title">> Recent Data</div>
          <div id="recentList"></div>
        </div>

        <!-- Character thumbs -->
        <div>
          <div class="char-thumbs" id="charThumbs"></div>
        </div>
      </div>
    </div>

    <!-- Board area (hidden by default) -->
    <div class="board-area" id="boardArea">
      <div class="board-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="board-back-btn" onclick="goMain()">&#x2190; back</button>
          <h2 id="boardTitle">Category</h2>
        </div>
        <div>
          <button class="view-toggle" id="viewToggle" onclick="toggleViewMode()">list</button>
          <button class="write-btn admin-only" onclick="openWriteForm()">새 기록 작성</button>
        </div>
      </div>
      <div class="write-form" id="writeForm">
        <input type="hidden" id="editPostId" value="">
        <input type="text" id="postTitleInput" placeholder="제목을 입력하세요">
        <div class="checkbox-row">
          <label class="checkbox-label"><input type="checkbox" id="pinCat"> 카테고리 공지</label>
          <label class="checkbox-label"><input type="checkbox" id="pinMain"> 메인 트랙</label>
        </div>
        <div style="margin-bottom:8px;">
          <button class="write-btn" style="background:#333;color:var(--text);font-size:0.7rem;" onclick="insertFold()">[+] 접은글</button>
        </div>
        <textarea id="postContent" style="display:none;"></textarea>
        <div style="text-align:right;margin-top:10px;">
          <button class="s-btn-cancel" onclick="closeWriteForm()">취소</button>
          <button class="write-btn" onclick="savePost()" style="margin-left:6px;">저장</button>
        </div>
      </div>
      <div class="post-list" id="postList"></div>
    </div>
  </div>
</div>

<!-- Char profile modal -->
<div class="modal-overlay" id="charModal">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeCharModal()">&#x2715;</button>
    <div class="modal-banner"><div class="modal-avatar" id="mAvatar">?</div></div>
    <div class="modal-body">
      <div class="modal-name" id="mName">Name</div>
      <div class="modal-class" id="mClass">Class</div>
      <div class="modal-bio" id="mBio">Bio</div>
    </div>
  </div>
</div>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>System Login</h2>
    <input type="password" id="adminPw" placeholder="비밀번호 (기본: 1234)" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="login-btn-row">
      <button class="login-ok" onclick="checkPw()">접속</button>
      <button class="login-cancel" onclick="closeLogin()">닫기</button>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box">
    <h2>Settings</h2>
    <div class="s-group"><label>사이트 제목 (HTML 가능)</label><input type="text" id="sTitle"></div>
    <div class="s-group"><label>D-Day 라벨</label><input type="text" id="sDdayLabel"></div>
    <div class="s-group"><label>D-Day 기준일 (YYYY-MM-DD)</label><input type="text" id="sDdayBase"></div>
    <div class="s-group"><label>상태 메시지 (줄바꿈 구분)</label><textarea id="sStatus" rows="4"></textarea></div>
    <div class="s-hr"></div>
    <div class="s-section-title">YouTube BGM</div>
    <div class="s-group"><label>유튜브 링크 (재생/정지 상태 유지됨)</label><input type="text" id="sYtUrl"></div>
    <div class="s-hr"></div>
    <div class="s-section-title">Characters</div>
    <div id="charSettingsArea"></div>
    <button class="char-add-btn" onclick="addChar()">+ 캐릭터 추가 (최대 5인)</button>
    <div class="s-hr"></div>
    <div class="s-btn-row">
      <button class="s-btn-save" onclick="saveSettings()">설정 저장</button>
      <button class="s-btn-cancel" onclick="closeSettings()">취소</button>
    </div>
  </div>
</div>

<script>
const PW = "1234";
let currentCat = "";
let editor = null;
let charImgTarget = -1;
let ytPlayer = null;
let ytReady = false;

let S = {
  title: "Observatory of<br>Disappearing Things",
  ddayLabel: "from the date of the voyage",
  ddayBase: "2015-08-30",
  statusLines: "/ Optical polarizer failure...\n/ Switch to Backup Thruster Set...\n/ Still functioning...\n/ Communication reconnection successful...\n/ Power depletion.\n/ Encountered ██",
  ytUrl: "",
  categories: [
    { name:"Instrument Status", subs:[] },
    { name:"Record", subs:[] },
    { name:"Data", subs:[] },
    { name:"Log", subs:[] },
    { name:"Swing_by", subs:[] }
  ],
  viewModes: {}, posts: {},
  characters: [
    {name:"Aether",class:"Vanguard / SSS",bio:"차원 간 공명을 조율하는 최상위 전위 요원.",emoji:"⚔",rank:"SSS",image:""},
    {name:"Nyx",class:"Shadow Weaver / SS",bio:"그림자를 조종하는 은밀한 작전 수행자.",emoji:"🌙",rank:"SS",image:""},
    {name:"Solaris",class:"Radiant Core / S",bio:"태양의 힘을 가진 방사형 코어 요원.",emoji:"☀",rank:"S",image:""},
    {name:"Cryo",class:"Frost Sentinel / A",bio:"절대영도의 수호자.",emoji:"❄",rank:"A",image:""},
    {name:"Pixel",class:"Data Phantom / B",bio:"데이터 차원에서 태어난 유령.",emoji:"💠",rank:"B",image:""}
  ]
};

// ===== INIT =====
function init() {
  load();
  const pid = new URLSearchParams(location.search).get('post');
  if (pid) {
    let tc=null;
    for(let c in S.posts) if(S.posts[c].find(p=>p.id===pid)){tc=c;break;}
    if(tc) openCategory(tc,pid);
    else goMain();
  } else goMain();
}

// ===== LOAD/SAVE =====
function load() {
  try {
    const d = localStorage.getItem('voyagerV4');
    if(d) S = {...S, ...JSON.parse(d)};
  } catch(e){}
  if(!S.posts) S.posts={};
  if(!S.viewModes) S.viewModes={};
  if(!S.characters) S.characters=[];

  document.getElementById('siteTitle').innerHTML = S.title;
  updateDday();
  renderStatus();
  renderCats();
  renderCharThumbs();
  renderCharGrid();
  renderRecent();
  initYT();

  // settings form
  document.getElementById('sTitle').value = S.title;
  document.getElementById('sDdayLabel').value = S.ddayLabel;
  document.getElementById('sDdayBase').value = S.ddayBase;
  document.getElementById('sStatus').value = S.statusLines;
  document.getElementById('sYtUrl').value = S.ytUrl||'';
}

function save() {
  try { localStorage.setItem('voyagerV4', JSON.stringify(S)); return true; }
  catch(e){ alert('저장 실패'); return false; }
}

// ===== DDAY =====
function updateDday() {
  document.getElementById('ddayLabel').textContent = S.ddayLabel;
  const base = new Date(S.ddayBase);
  const diff = Math.floor((new Date()-base)/(1000*60*60*24));
  document.getElementById('ddayValue').textContent = 'D+' + diff;
}

// ===== STATUS =====
function renderStatus() {
  const el = document.getElementById('statusArea');
  el.innerHTML = '';
  (S.statusLines||'').split('\n').filter(l=>l.trim()).forEach(line => {
    el.innerHTML += `<div>${line}</div>`;
  });
}

// ===== CATEGORIES =====
function renderCats() {
  const el = document.getElementById('catList');
  el.innerHTML = '';
  S.categories.forEach((cat,i) => {
    // Main category
    let html = `<div>
      <button class="cat-btn" id="cat-btn-${i}">
        <span class="cat-edit-btn" onclick="event.stopPropagation();editCatName(${i})">&#x270E;</span>
        <span class="cat-edit-btn del" onclick="event.stopPropagation();delCat(${i})">&#x2715;</span>
        <span class="cat-name" id="cat-name-${i}" onclick="catClick(${i})">> ${cat.name}</span>
      </button>`;
    // Sub categories
    if (cat.subs.length > 0) {
      html += `<div class="sub-list" id="sub-list-${i}">`;
      cat.subs.forEach((sub,j) => {
        html += `<button class="sub-btn">
          <span class="sub-edit-btn" onclick="event.stopPropagation();editSubName(${i},${j})">&#x270E;</span>
          <span class="sub-edit-btn del" onclick="event.stopPropagation();delSub(${i},${j})">&#x2715;</span>
          <span onclick="openCategory('${esc(sub)}')">${sub}</span>
        </button>`;
      });
      html += `<button class="sub-btn admin-only" onclick="addSub(${i})" style="color:#555;font-size:0.7rem;">+ 소분류</button>`;
      html += `</div>`;
    }
    html += `</div>`;
    el.innerHTML += html;
  });
  // add main cat button
  el.innerHTML += `<button class="add-cat-btn admin-only" onclick="addCat()">+ 대분류 추가</button>`;
}

function esc(s) { return s.replace(/'/g,"\\'"); }

function catClick(i) {
  const cat = S.categories[i];
  if (cat.subs.length > 0) {
    // toggle sub visibility
    const sl = document.getElementById('sub-list-'+i);
    if(sl) sl.style.display = sl.style.display==='none' ? 'block' : 'none';
  } else {
    openCategory(cat.name);
  }
}

function addCat() {
  const n=prompt("대분류 이름:"); if(!n) return;
  S.categories.push({name:n,subs:[]});
  save(); renderCats();
}
function addSub(m) {
  const n=prompt("소분류 이름:"); if(!n) return;
  S.categories[m].subs.push(n); save(); renderCats();
}

function editCatName(i) {
  const span = document.getElementById('cat-name-'+i);
  const old = S.categories[i].name;
  span.innerHTML = `<input class="cat-edit-input" value="${old}" id="eci-${i}"
    onblur="finishEditCat(${i})" onkeydown="if(event.key==='Enter')this.blur();">`;
  document.getElementById('eci-'+i).focus();
}
function finishEditCat(i) {
  const v = document.getElementById('eci-'+i).value.trim();
  const old = S.categories[i].name;
  if(v && v!==old) {
    S.categories[i].name = v;
    // move posts
    if(S.posts[old]){S.posts[v]=S.posts[old];delete S.posts[old];}
    if(S.viewModes[old]){S.viewModes[v]=S.viewModes[old];delete S.viewModes[old];}
    save();
    if(currentCat===old){currentCat=v; document.getElementById('boardTitle').textContent=v;}
  }
  renderCats();
}

function editSubName(m,s) {
  const old = S.categories[m].subs[s];
  const n = prompt("소분류 이름 수정:", old);
  if(n && n!==old) {
    S.categories[m].subs[s] = n;
    if(S.posts[old]){S.posts[n]=S.posts[old];delete S.posts[old];}
    if(S.viewModes[old]){S.viewModes[n]=S.viewModes[old];delete S.viewModes[old];}
    save(); renderCats();
    if(currentCat===old) openCategory(n);
  }
}

function delCat(i) { if(confirm("삭제?")){ S.categories.splice(i,1); save(); renderCats(); goMain(); } }
function delSub(m,s) {
  const n=S.categories[m].subs[s];
  if(confirm(`"${n}" 삭제?`)){ S.categories[m].subs.splice(s,1); delete S.posts[n]; save(); renderCats(); goMain(); }
}

// ===== NAV =====
function goMain() {
  document.getElementById('mainDashboard').style.display = 'flex';
  document.getElementById('boardArea').style.display = 'none';
  renderRecent(); renderCharThumbs();
  history.pushState({},'',location.pathname);
}

function openCategory(name, scrollTo) {
  document.getElementById('mainDashboard').style.display = 'none';
  document.getElementById('boardArea').style.display = 'block';
  document.getElementById('boardTitle').textContent = name;
  currentCat = name;
  closeWriteForm();
  renderPosts();
  if(scrollTo) setTimeout(()=>{
    const el=document.getElementById('p-'+scrollTo);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.borderColor='var(--accent)'; setTimeout(()=>el.style.borderColor='',2500);}
  },300);
}

// ===== RECENT DATA =====
function renderRecent() {
  const el = document.getElementById('recentList');
  el.innerHTML = '';
  let all = [];
  for(const c in S.posts) S.posts[c].forEach(p=>all.push({...p,cat:c}));
  all.sort((a,b)=>parseInt(b.id)-parseInt(a.id));
  const top = all.slice(0,4);
  if(!top.length){ el.innerHTML='<div class="recent-item">> -</div>'.repeat(3); return; }
  top.forEach(p=>{
    const d=document.createElement('div'); d.className='recent-item';
    d.innerHTML=`> ${p.title}`; d.onclick=()=>openCategory(p.cat,p.id);
    el.appendChild(d);
  });
}

// ===== CHARACTERS =====
function renderCharThumbs() {
  const row = document.getElementById('charThumbs');
  row.innerHTML = '';
  (S.characters||[]).forEach((ch,i)=>{
    const d=document.createElement('div'); d.className='char-thumb';
    d.onclick=()=>openCharProfile(i);
    d.innerHTML = ch.image ? `<img src="${ch.image}">` : `<div class="char-thumb-emoji">${ch.emoji||'?'}</div>`;
    row.appendChild(d);
  });
  if(S.characters.length) row.innerHTML += `<div class="char-more-btn" onclick="toggleCharSection()">...</div>`;
}

function renderCharGrid() {
  const g = document.getElementById('charGrid');
  g.innerHTML = '';
  (S.characters||[]).forEach((ch,i)=>{
    const card=document.createElement('div'); card.className='char-card'; card.onclick=()=>openCharProfile(i);
    const img = ch.image ? `<img src="${ch.image}">` : `<span style="font-size:1.8rem">${ch.emoji||'?'}</span>`;
    card.innerHTML=`<div class="char-card-img">${img}<span class="char-card-rank">${ch.rank||'?'}</span>
      <button class="char-img-upload" onclick="event.stopPropagation();triggerCharImg(${i})">img</button></div>
      <div class="char-card-body"><div class="char-card-name">${ch.name}</div><div class="char-card-class">${(ch.class||'').split('/')[0].trim()}</div></div>`;
    g.appendChild(card);
  });
}

function toggleCharSection() { document.getElementById('charSection').classList.toggle('open'); }

function openCharProfile(i) {
  const ch=S.characters[i]; if(!ch) return;
  document.getElementById('mName').textContent=ch.name;
  document.getElementById('mClass').textContent=ch.class;
  document.getElementById('mBio').textContent=ch.bio;
  const av=document.getElementById('mAvatar');
  av.innerHTML=ch.image?`<img src="${ch.image}">`:(ch.emoji||'?');
  document.getElementById('charModal').classList.add('show');
}
function closeCharModal(){document.getElementById('charModal').classList.remove('show');}
document.getElementById('charModal').addEventListener('click',function(e){if(e.target===this)closeCharModal();});

function triggerCharImg(i){charImgTarget=i;document.getElementById('charImgInput').click();}
document.getElementById('charImgInput').addEventListener('change',function(e){
  const f=e.target.files[0]; if(!f||charImgTarget<0) return;
  const r=new FileReader();
  r.onload=function(ev){S.characters[charImgTarget].image=ev.target.result;save();renderCharGrid();renderCharThumbs();charImgTarget=-1;};
  r.readAsDataURL(f); this.value='';
});

// ===== YOUTUBE BGM (persist play state) =====
function getYTId(url){if(!url)return null;const m=url.match(/(?:youtu\.be\/|v=|\/embed\/)([^#&?]{11})/);return m?m[1]:null;}

function initYT() {
  const vid = getYTId(S.ytUrl);
  const area = document.getElementById('ytArea');
  if(!vid){ area.style.display='none'; return; }

  // Check saved state
  const wasPaused = localStorage.getItem('voyager_yt_paused') === 'true';

  area.style.display = 'block';
  area.innerHTML = `<div id="ytPlayerDiv"></div>
    <div style="margin-top:6px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:0.6rem;color:var(--text-dim);">YouTube BGM</span>
      <button class="yt-toggle-btn" id="ytToggleBtn" onclick="toggleYTVisibility()">hide</button>
    </div>`;

  // Load YT API
  if(!window.YT) {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = function() {
      createYTPlayer(vid, wasPaused);
    };
  } else {
    createYTPlayer(vid, wasPaused);
  }
}

function createYTPlayer(vid, startPaused) {
  ytPlayer = new YT.Player('ytPlayerDiv', {
    height: '0', width: '0',
    videoId: vid,
    playerVars: { autoplay: startPaused ? 0 : 1, loop: 1, playlist: vid },
    events: {
      onReady: function(e) {
        ytReady = true;
        if(startPaused) {
          // Don't play
          document.getElementById('trackName').textContent = ytPlayer.getVideoData().title || vid;
        } else {
          e.target.playVideo();
          document.getElementById('trackName').textContent = ytPlayer.getVideoData().title || vid;
          document.getElementById('recordImg').classList.remove('paused');
          document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';
        }
        if(startPaused) {
          document.getElementById('recordImg').classList.add('paused');
          document.getElementById('playBtn').innerHTML = '&#9654;';
        }
      },
      onStateChange: function(e) {
        if(e.data === YT.PlayerState.PLAYING) {
          localStorage.setItem('voyager_yt_paused','false');
          document.getElementById('recordImg').classList.remove('paused');
          document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';
          try{ document.getElementById('trackName').textContent = ytPlayer.getVideoData().title; }catch(x){}
        } else if(e.data === YT.PlayerState.PAUSED) {
          localStorage.setItem('voyager_yt_paused','true');
          document.getElementById('recordImg').classList.add('paused');
          document.getElementById('playBtn').innerHTML = '&#9654;';
        } else if(e.data === YT.PlayerState.ENDED) {
          ytPlayer.playVideo(); // loop
        }
      }
    }
  });
}

function togglePlay() {
  if(!ytReady || !ytPlayer) return;
  const state = ytPlayer.getPlayerState();
  if(state === YT.PlayerState.PLAYING) {
    ytPlayer.pauseVideo();
  } else {
    ytPlayer.playVideo();
  }
}
function prevTrack() { if(ytReady&&ytPlayer) ytPlayer.seekTo(0); }
function nextTrack() { if(ytReady&&ytPlayer) ytPlayer.seekTo(0); }

function toggleYTVisibility() {
  const div = document.getElementById('ytPlayerDiv');
  const btn = document.getElementById('ytToggleBtn');
  if(div.style.display==='none'){div.style.display='block';btn.textContent='hide';}
  else{div.style.display='none';btn.textContent='show';}
}

// Progress bar sync
setInterval(()=>{
  if(ytReady && ytPlayer && ytPlayer.getDuration) {
    try {
      const dur = ytPlayer.getDuration();
      const cur = ytPlayer.getCurrentTime();
      if(dur>0) {
        const pct = (cur/dur)*100;
        const prog = document.getElementById('progress');
        prog.value = pct;
        prog.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, #444 ${pct}%, #444 100%)`;
      }
    }catch(e){}
  }
},500);

document.getElementById('progress').addEventListener('input',function(){
  if(ytReady && ytPlayer && ytPlayer.getDuration) {
    const dur = ytPlayer.getDuration();
    ytPlayer.seekTo((this.value/100)*dur, true);
  }
});

// ===== BOARD / POSTS =====
function openWriteForm(id) {
  document.getElementById('writeForm').style.display='block';
  try {
    if(!editor) {
      editor=SUNEDITOR.create('postContent',{
        buttonList:[['undo','redo'],['bold','underline','italic','strike'],['fontColor','hiliteColor','formatBlock','fontSize'],['removeFormat'],['outdent','indent','align','horizontalRule','list','table'],['link','image','video','blockquote'],['fullScreen','showBlocks','codeView']],
        fontSize:[10,12,14,16,18,20,24,30], width:'100%', height:'300px'
      });
    }
    if(id) {
      const p=S.posts[currentCat].find(x=>x.id===id);
      document.getElementById('editPostId').value=id;
      document.getElementById('postTitleInput').value=p.title;
      document.getElementById('pinCat').checked=p.pinCat||false;
      document.getElementById('pinMain').checked=p.pinMain||false;
      editor.setContents(p.content);
    } else {
      document.getElementById('editPostId').value='';
      document.getElementById('postTitleInput').value='';
      document.getElementById('pinCat').checked=false;
      document.getElementById('pinMain').checked=false;
      editor.setContents('');
    }
  } catch(e){ document.getElementById('postContent').style.display='block'; }
}
function closeWriteForm(){document.getElementById('writeForm').style.display='none';}
function insertFold(){if(editor)editor.insertHTML(`<details><summary>펼치기</summary><p>내용</p></details><p><br></p>`);}

function savePost() {
  const title=document.getElementById('postTitleInput').value.trim();
  const content=editor?editor.getContents():document.getElementById('postContent').value;
  const pinCat=document.getElementById('pinCat').checked;
  const pinMain=document.getElementById('pinMain').checked;
  const editId=document.getElementById('editPostId').value;
  if(!currentCat){alert('카테고리 없음');return;}
  if(!title||content==='<p><br></p>'||!content){alert('제목과 내용을 입력하세요');return;}
  if(!S.posts[currentCat])S.posts[currentCat]=[];
  if(editId){
    const p=S.posts[currentCat].find(x=>x.id===editId);
    p.title=title;p.content=content;p.pinCat=pinCat;p.pinMain=pinMain;
  } else {
    const now=new Date();
    const d=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    S.posts[currentCat].unshift({id:Date.now().toString(),title,content,date:d,pinCat,pinMain});
  }
  if(save()){renderPosts();closeWriteForm();renderRecent();}
}

function deletePost(id){
  if(confirm('삭제?')){S.posts[currentCat]=S.posts[currentCat].filter(p=>p.id!==id);save();renderPosts();renderRecent();}
}

function toggleViewMode(){
  if(!currentCat)return;
  const c=S.viewModes[currentCat]||'list';
  S.viewModes[currentCat]=c==='list'?'gallery':'list';
  save();renderPosts();
}

function renderPosts(){
  const c=document.getElementById('postList');
  const vb=document.getElementById('viewToggle');
  const vm=S.viewModes[currentCat]||'list';
  c.innerHTML='';
  if(vm==='gallery'){c.classList.add('gallery-mode');vb.textContent='gallery';}
  else{c.classList.remove('gallery-mode');vb.textContent='list';}
  const posts=S.posts[currentCat]||[];
  if(!posts.length){c.innerHTML='<p style="text-align:center;color:#555;margin-top:40px;font-size:0.8rem;">NO RECORDS FOUND</p>';return;}
  [...posts].sort((a,b)=>a.pinCat===b.pinCat?0:a.pinCat?-1:1).forEach(p=>{
    const card=document.createElement('div');card.id='p-'+p.id;
    card.className=p.pinCat?'post-card notice':'post-card';
    const badge=p.pinCat?'<span class="notice-badge">NOTICE</span>':'';
    card.innerHTML=`
      <div class="post-header"><div class="post-title-text">${badge}${p.title}</div>
      <div class="post-date">${p.date}<br><button class="post-link-btn" onclick="copyLink('${p.id}')">link</button></div></div>
      <div class="post-body">${p.content}</div>
      <div class="post-actions">
        <button class="write-btn" style="background:transparent;border:1px solid #444;color:var(--text-dim);font-size:0.7rem;margin-right:4px;" onclick="openWriteForm('${p.id}')">수정</button>
        <button class="write-btn" style="background:#c44;font-size:0.7rem;" onclick="deletePost('${p.id}')">삭제</button>
      </div>`;
    c.appendChild(card);
  });
}
function copyLink(id){navigator.clipboard.writeText(location.origin+location.pathname+'?post='+id).then(()=>alert('주소 복사됨'));}

// ===== SETTINGS =====
function renderCharSettings(){
  const a=document.getElementById('charSettingsArea');a.innerHTML='';
  (S.characters||[]).forEach((ch,i)=>{
    a.innerHTML+=`<div class="char-setting-card">
      <button class="char-del-btn" onclick="removeChar(${i})">&#x2715;</button>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px;">
        <div class="s-group" style="margin:0"><label>이름</label><input type="text" id="cn-${i}" value="${ch.name}"></div>
        <div class="s-group" style="margin:0"><label>클래스</label><input type="text" id="cc-${i}" value="${ch.class}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px;">
        <div class="s-group" style="margin:0"><label>이모지</label><input type="text" id="ce-${i}" value="${ch.emoji||''}" style="width:50px"></div>
        <div class="s-group" style="margin:0"><label>등급</label><input type="text" id="cr-${i}" value="${ch.rank||''}" style="width:60px"></div>
      </div>
      <div class="s-group" style="margin:0"><label>소개</label><textarea id="cb-${i}" rows="2" style="width:100%;background:var(--bg);border:1px solid #333;color:var(--text);font-family:'Pretendard',sans-serif;padding:5px;resize:vertical;font-size:0.8rem;">${ch.bio}</textarea></div>
    </div>`;
  });
}
function addChar(){if(S.characters.length>=5){alert('최대 5인');return;}S.characters.push({name:"New",class:"Unknown",bio:"소개 입력",emoji:"✦",rank:"?",image:""});renderCharSettings();}
function removeChar(i){if(confirm('삭제?')){S.characters.splice(i,1);renderCharSettings();}}
function collectChars(){
  S.characters.forEach((ch,i)=>{
    const el=document.getElementById('cn-'+i);if(!el)return;
    ch.name=el.value;ch.class=document.getElementById('cc-'+i).value;
    ch.emoji=document.getElementById('ce-'+i).value;ch.rank=document.getElementById('cr-'+i).value;
    ch.bio=document.getElementById('cb-'+i).value;
  });
}

function openSettings(){renderCharSettings();document.getElementById('settingsOverlay').classList.add('show');
  document.getElementById('sTitle').value=S.title;
  document.getElementById('sDdayLabel').value=S.ddayLabel;
  document.getElementById('sDdayBase').value=S.ddayBase;
  document.getElementById('sStatus').value=S.statusLines;
  document.getElementById('sYtUrl').value=S.ytUrl||'';
}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('show');}

function saveSettings(){
  collectChars();
  S.title=document.getElementById('sTitle').value;
  S.ddayLabel=document.getElementById('sDdayLabel').value;
  S.ddayBase=document.getElementById('sDdayBase').value;
  S.statusLines=document.getElementById('sStatus').value;

  const newUrl = document.getElementById('sYtUrl').value;
  const oldUrl = S.ytUrl;
  S.ytUrl = newUrl;

  document.getElementById('siteTitle').innerHTML=S.title;
  updateDday(); renderStatus(); renderCharGrid(); renderCharThumbs();

  save(); closeSettings();
  // Re-init YT if URL changed
  if(newUrl !== oldUrl) { localStorage.removeItem('voyager_yt_paused'); initYT(); }
}

// ===== LOGIN =====
function openLogin(){document.getElementById('loginOverlay').classList.add('show');}
function closeLogin(){document.getElementById('loginOverlay').classList.remove('show');}
function checkPw(){
  if(document.getElementById('adminPw').value===PW){
    document.body.classList.add('admin-mode');
    document.getElementById('loginBtn').textContent='logout';
    document.getElementById('loginBtn').setAttribute('onclick','doLogout()');
    closeLogin(); renderCats();
  } else alert('비밀번호 불일치');
  document.getElementById('adminPw').value='';
}
function doLogout(){
  document.body.classList.remove('admin-mode');
  document.getElementById('loginBtn').textContent='login';
  document.getElementById('loginBtn').setAttribute('onclick','openLogin()');
  renderCats();
}

// ===== DOTS ANIMATION =====
let dotCount=0;
setInterval(()=>{dotCount=(dotCount+1)%4;const d=document.getElementById('dots');if(d)d.textContent='.'.repeat(dotCount);},400);

// ===== KEYBOARD =====
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeCharModal();closeLogin();closeSettings();}});

init();
</script>
</body>
</html>
