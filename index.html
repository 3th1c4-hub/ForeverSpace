<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연구소 메인프레임</title>
    <style>
        /* 테마 컬러 #5AE7EF 유지 */
        :root {
            --theme-color: #5AE7EF;
            --theme-dim: rgba(90, 231, 239, 0.3);
            --bg-color: #030508;
            --panel-bg: rgba(5, 10, 15, 0.85);
            --text-color: #c0cdd8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', 'Courier New', monospace;
            background-color: var(--bg-color);
            background-size: cover; background-position: center;
            color: var(--text-color); height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* 메인 패널 */
        .mainframe-panel {
            display: flex; width: 85vw; max-width: 1200px; height: 80vh;
            background: var(--panel-bg); border: 1px solid var(--theme-color);
            border-radius: 12px; box-shadow: 0 0 20px var(--theme-dim), inset 0 0 20px var(--theme-dim);
            backdrop-filter: blur(10px); position: relative;
        }

        /* 좌측 사이드바 */
        .sidebar {
            width: 260px; border-right: 1px solid var(--theme-dim);
            padding: 2rem 1.5rem; display: flex; flex-direction: column;
        }

        .header-info { font-size: 1rem; color: var(--theme-color); margin-bottom: 2rem; font-weight: bold; letter-spacing: 1px; }

        /* 네비게이션 메뉴 */
        .nav-menu { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
        .menu-item { margin-bottom: 0.5rem; }
        .parent-cat {
            display: block; color: var(--text-color); font-size: 1rem; padding: 0.5rem 0;
            cursor: pointer; transition: color 0.2s; letter-spacing: 1px;
        }
        .parent-cat:hover { color: var(--theme-color); }
        .sub-cat-list { display: none; padding-left: 1rem; margin-bottom: 1rem; border-left: 1px solid var(--theme-dim); margin-left: 0.5rem; }
        .menu-item.open .sub-cat-list { display: block; }
        .sub-cat { display: block; color: #8899a6; font-size: 0.85rem; padding: 0.3rem 0; cursor: pointer; transition: color 0.2s; }
        .sub-cat:hover { color: var(--theme-color); }

        /* 하단 위젯 (이미지 & 시스템 & 로그인) */
        .bottom-widgets { margin-top: auto; text-align: center; }
        
        /* (4) 캘린더 대신 들어갈 이미지 영역 */
        .sidebar-image-container {
            width: 100%; height: 120px; margin-bottom: 1rem;
            border: 1px solid var(--theme-dim); border-radius: 4px; overflow: hidden;
            background-color: #000; display: flex; justify-content: center; align-items: center;
        }
        .sidebar-image-container img { width: 100%; height: 100%; object-fit: cover; }

        .sys-time-box {
            border: 1px solid var(--theme-dim); padding: 0.5rem; border-radius: 4px;
            font-size: 0.8rem; color: var(--theme-color); letter-spacing: 2px; margin-bottom: 1rem;
        }

        /* (2) 명시적인 로그인 버튼 */
        .auth-btn {
            width: 100%; background: transparent; color: var(--theme-color);
            border: 1px dashed var(--theme-color); padding: 0.5rem; border-radius: 4px;
            cursor: pointer; font-size: 0.85rem; letter-spacing: 1px; transition: 0.3s;
        }
        .auth-btn:hover { background: var(--theme-color); color: #000; }

        /* 우측 메인 콘텐츠 영역 */
        .content-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 3rem; }

        /* 인트로 화면 & 타이핑 효과 */
        .intro-screen { text-align: center; width: 100%; }
        .intro-text-area { font-size: 1.2rem; color: var(--theme-color); margin-bottom: 2rem; min-height: 80px; text-shadow: 0 0 5px var(--theme-dim); line-height: 1.6; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background-color: var(--theme-color); vertical-align: middle; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-group { display: none; gap: 1rem; justify-content: center; } /* 초기엔 숨김 */
        .btn {
            background: transparent; color: var(--theme-color); border: 1px solid var(--theme-color);
            padding: 0.5rem 2rem; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: all 0.3s; letter-spacing: 1px;
        }
        .btn:hover { background: var(--theme-color); color: var(--bg-color); box-shadow: 0 0 15px var(--theme-dim); }

        /* 콘텐츠 뷰어 */
        .data-viewer { display: none; width: 100%; height: 100%; flex-direction: column; }
        .content-header { border-bottom: 1px solid var(--theme-dim); padding-bottom: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .content-title-area h2 { font-size: 1.5rem; font-weight: normal; color: var(--theme-color); }
        .content-body { flex: 1; overflow-y: auto; color: #a0b0c0; line-height: 1.8; }

        /* (1) 관리자(로그인) 전용 UI */
        .admin-controls { display: none; gap: 0.5rem; }
        .admin-btn { font-size: 0.8rem; padding: 0.3rem 0.8rem; border: 1px solid var(--theme-color); background: transparent; color: var(--theme-color); cursor: pointer; transition: 0.2s; }
        .admin-btn:hover { background: var(--theme-color); color: #000; }
        
        /* body에 is-admin 클래스가 붙으면 편집 버튼들이 보임 */
        .is-admin .admin-controls { display: flex; } 
    </style>
</head>
<body>

    <script>
        const SITE_CONFIG = {
            // (5) 홈페이지 및 카테고리 등 텍스트 설정
            siteTitle: "PROJECT: ERG MAIN FRAME", // 브라우저 탭 이름
            subjectName: "실험체: 혜레",           // 좌측 상단 이름
            
            // (4) 사이드바에 들어갈 이미지 주소 (원하는 이미지 링크로 변경하세요)
            sidebarImageUrl: "https://via.placeholder.com/300x150/050a0f/5ae7ef?text=SUBJECT_IMG", 
            
            // (6) 인트로 타이핑 문구 설정 (배열에 적힌 순서대로 한 줄씩 타이핑됩니다)
            introTypingTexts: [
                "ESTABLISHING SECURE CONNECTION...",
                "LOADING CLASSIFIED DATA...",
                "연구 일지를 열람하시겠습니까?"
            ],
            introYes: "YES",
            introNo: "NO",

            // 카테고리 및 서브 카테고리 설정
            categories: [
                { name: "HOME", sub: [] },
                { name: "ARCHIVE", sub: ["관찰 기록", "폐기된 데이터"] },
                { name: "TRPG LOG", sub: ["Session 1", "Session 2"] },
                { name: "GALLERY", sub: [] },
                { name: "GUESTBOOK", sub: [] }
            ],
            
            // (1) 마스터 비밀번호 (글쓰기/수정/삭제 권한용)
            masterPassword: "123" 
        };
    </script>

    <div class="mainframe-panel">
        <aside class="sidebar">
            <div class="header-info" id="subject-display">SUBJECT_NAME</div>
            
            <nav class="nav-menu" id="menu-container">
                </nav>

            <div class="bottom-widgets">
                <div class="sidebar-image-container">
                    <img id="sidebar-img" src="" alt="Sidebar Image">
                </div>
                
                <div class="sys-time-box">
                    [ SYSTEM TIME ]<br>
                    <span id="clock-display">00 : 00 : 00</span>
                </div>

                <button id="auth-btn" class="auth-btn" onclick="toggleLogin()">[ ADMIN LOGIN ]</button>
            </div>
        </aside>

        <main class="content-area">
            <div class="intro-screen" id="intro-box">
                <div class="intro-text-area">
                    <span id="typing-output"></span><span class="cursor"></span>
                </div>
                <div class="btn-group" id="intro-btns">
                    <button class="btn" id="btn-yes">YES</button>
                    <button class="btn" id="btn-no">NO</button>
                </div>
            </div>

            <div class="data-viewer" id="data-box">
                <div class="content-header">
                    <div class="content-title-area">
                        <h2 id="content-title">CATEGORY_NAME</h2>
                    </div>
                    <div class="admin-controls">
                        <button class="admin-btn" onclick="alert('새 글 쓰기 에디터를 엽니다.')">WRITE</button>
                        <button class="admin-btn" onclick="alert('현재 글을 수정합니다.')">EDIT</button>
                        <button class="admin-btn" onclick="alert('현재 글을 삭제합니다.')">DELETE</button>
                    </div>
                </div>
                <div class="content-body" id="content-body">
                    데이터를 불러오는 중입니다...
                </div>
            </div>
        </main>
    </div>

    <script>
        let isLoggedIn = false;

        function init() {
            // 유저 설정값 적용
            document.title = SITE_CONFIG.siteTitle;
            document.getElementById('subject-display').innerText = SITE_CONFIG.subjectName;
            document.getElementById('sidebar-img').src = SITE_CONFIG.sidebarImageUrl;
            document.getElementById('btn-yes').innerText = SITE_CONFIG.introYes;
            document.getElementById('btn-no').innerText = SITE_CONFIG.introNo;
            
            renderMenu();
            startClock();
            startTypingEffect();
        }

        // 인트로 타이핑 효과 실행
        let typeLineIdx = 0;
        let typeCharIdx = 0;
        function startTypingEffect() {
            const output = document.getElementById('typing-output');
            
            if (typeLineIdx < SITE_CONFIG.introTypingTexts.length) {
                let currentLine = SITE_CONFIG.introTypingTexts[typeLineIdx];
                if (typeCharIdx < currentLine.length) {
                    output.innerHTML += currentLine.charAt(typeCharIdx);
                    typeCharIdx++;
                    setTimeout(startTypingEffect, 40); // 글자 타이핑 속도
                } else {
                    output.innerHTML += "<br>";
                    typeLineIdx++;
                    typeCharIdx = 0;
                    setTimeout(startTypingEffect, 500); // 줄바꿈 대기 시간
                }
            } else {
                // 타이핑이 모두 끝나면 버튼 표시
                document.getElementById('intro-btns').style.display = 'flex';
            }
        }

        // 메뉴 렌더링
        function renderMenu() {
            const container = document.getElementById('menu-container');
            SITE_CONFIG.categories.forEach((cat) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                
                const parentTitle = document.createElement('span');
                parentTitle.className = 'parent-cat';
                parentTitle.innerText = `> ${cat.name}`;
                parentTitle.onclick = () => {
                    itemDiv.classList.toggle('open');
                    if(cat.sub.length === 0) loadContent(cat.name);
                };
                itemDiv.appendChild(parentTitle);

                if (cat.sub.length > 0) {
                    const subList = document.createElement('div');
                    subList.className = 'sub-cat-list';
                    cat.sub.forEach(sub => {
                        const subItem = document.createElement('span');
                        subItem.className = 'sub-cat';
                        subItem.innerText = "- " + sub;
                        subItem.onclick = () => loadContent(`${cat.name} : ${sub}`);
                        subList.appendChild(subItem);
                    });
                    itemDiv.appendChild(subList);
                }
                container.appendChild(itemDiv);
            });
        }

        // 로그인 / 로그아웃 토글
        function toggleLogin() {
            const authBtn = document.getElementById('auth-btn');
            if (isLoggedIn) {
                // 로그아웃 처리
                isLoggedIn = false;
                document.body.classList.remove('is-admin');
                authBtn.innerText = "[ ADMIN LOGIN ]";
                alert("로그아웃 되었습니다. 편집 권한이 회수됩니다.");
            } else {
                // 로그인 처리
                const pwd = prompt("SYSTEM ADMIN PASSWORD를 입력하세요:");
                if (pwd === SITE_CONFIG.masterPassword) {
                    isLoggedIn = true;
                    document.body.classList.add('is-admin'); // 편집 버튼 활성화
                    authBtn.innerText = "[ LOGOUT ]";
                    alert("인증 완료. 글쓰기, 편집, 삭제 기능이 활성화되었습니다.");
                } else if (pwd !== null) {
                    alert("비밀번호가 일치하지 않습니다.");
                }
            }
        }

        // 인트로 통과 이벤트
        document.getElementById('btn-yes').onclick = () => {
            document.getElementById('intro-box').style.display = 'none';
            document.getElementById('data-box').style.display = 'flex';
            loadContent("HOME");
        };

        document.getElementById('btn-no').onclick = () => {
            document.getElementById('typing-output').innerHTML = "SYSTEM TERMINATED.<br>접근이 거부되었습니다.";
            document.getElementById('intro-btns').style.display = 'none';
        };

        // 콘텐츠 표시
        function loadContent(title) {
            document.getElementById('intro-box').style.display = 'none';
            document.getElementById('data-box').style.display = 'flex';
            document.getElementById('content-title').innerText = title;
            document.getElementById('content-body').innerHTML = 
                `[ ${title} ] 데이터 열람 중...<br><br>여기에 등록된 내용이 표시됩니다. 관리자 로그인 시 우측 상단의 WRITE / EDIT 버튼을 눌러 내용을 작성할 수 있습니다.`;
        }

        // 시계
        function startClock() {
            setInterval(() => {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('clock-display').innerText = `${h} : ${m} : ${s}`;
            }, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
