<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연구소 메인프레임</title>
    <style>
        :root {
            --theme-color: #5AE7EF;
            --theme-dim: rgba(90, 231, 239, 0.3);
            --bg-color: #030508;
            --panel-bg: rgba(5, 10, 15, 0.85);
            --text-color: #c0cdd8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', 'Courier New', monospace;
            background-color: var(--bg-color); color: var(--text-color);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .mainframe-panel {
            display: flex; width: 85vw; max-width: 1200px; height: 80vh;
            background: var(--panel-bg); border: 1px solid var(--theme-color);
            border-radius: 12px; box-shadow: 0 0 20px var(--theme-dim), inset 0 0 20px var(--theme-dim);
            backdrop-filter: blur(10px);
        }

        /* 사이드바 */
        .sidebar { width: 260px; border-right: 1px solid var(--theme-dim); padding: 2rem 1.5rem; display: flex; flex-direction: column; }
        .header-info { font-size: 1rem; color: var(--theme-color); margin-bottom: 2rem; font-weight: bold; letter-spacing: 1px; }

        /* 메뉴 */
        .nav-menu { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
        .menu-item { margin-bottom: 0.5rem; }
        .parent-cat { display: block; color: var(--text-color); font-size: 1rem; padding: 0.5rem 0; cursor: pointer; transition: color 0.2s; }
        .parent-cat:hover { color: var(--theme-color); }
        .sub-cat-list { display: none; padding-left: 1rem; margin-bottom: 1rem; border-left: 1px solid var(--theme-dim); margin-left: 0.5rem; }
        .menu-item.open .sub-cat-list { display: block; }
        .sub-cat { display: block; color: #8899a6; font-size: 0.85rem; padding: 0.3rem 0; cursor: pointer; }
        .sub-cat:hover { color: var(--theme-color); }

        /* 하단 위젯 */
        .bottom-widgets { margin-top: auto; text-align: center; }
        .sidebar-image-container {
            width: 100%; height: 120px; margin-bottom: 1rem;
            border: 1px solid var(--theme-dim); border-radius: 4px; overflow: hidden; background-color: #000;
        }
        .sidebar-image-container img { width: 100%; height: 100%; object-fit: cover; }
        .sys-time-box { border: 1px solid var(--theme-dim); padding: 0.5rem; border-radius: 4px; font-size: 0.8rem; color: var(--theme-color); margin-bottom: 1rem; }
        .auth-btn { width: 100%; background: transparent; color: var(--theme-color); border: 1px dashed var(--theme-color); padding: 0.5rem; border-radius: 4px; cursor: pointer; transition: 0.3s; margin-bottom: 0.5rem; }
        .auth-btn:hover { background: var(--theme-color); color: #000; }

        /* 관리자 전용 셋팅 버튼 */
        .settings-btn { display: none; width: 100%; background: var(--theme-dim); color: var(--theme-color); border: 1px solid var(--theme-color); padding: 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .settings-btn:hover { background: var(--theme-color); color: #000; }
        .is-admin .settings-btn { display: block; }

        /* 메인 콘텐츠 영역 */
        .content-area { flex: 1; display: flex; flex-direction: column; padding: 3rem; position: relative; }

        /* 인트로 */
        .intro-screen { text-align: center; margin: auto; }
        .intro-text-area { font-size: 1.2rem; color: var(--theme-color); margin-bottom: 2rem; min-height: 80px; text-shadow: 0 0 5px var(--theme-dim); line-height: 1.6; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background-color: var(--theme-color); vertical-align: middle; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .btn-group { display: none; gap: 1rem; justify-content: center; }
        .btn { background: transparent; color: var(--theme-color); border: 1px solid var(--theme-color); padding: 0.5rem 2rem; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--theme-color); color: var(--bg-color); box-shadow: 0 0 15px var(--theme-dim); }

        /* 뷰어 & 에디터 공통 */
        .content-header { border-bottom: 1px solid var(--theme-dim); padding-bottom: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .content-title-area h2 { font-size: 1.5rem; font-weight: normal; color: var(--theme-color); }
        
        .data-viewer, .data-editor { display: none; width: 100%; height: 100%; flex-direction: column; }
        .content-body { flex: 1; overflow-y: auto; color: #a0b0c0; line-height: 1.8; white-space: pre-wrap; }

        /* 관리자 버튼 (뷰어용) */
        .admin-controls { display: none; gap: 0.5rem; }
        .admin-btn { font-size: 0.8rem; padding: 0.3rem 0.8rem; border: 1px solid var(--theme-color); background: transparent; color: var(--theme-color); cursor: pointer; }
        .admin-btn:hover { background: var(--theme-color); color: #000; }
        .is-admin .admin-controls { display: flex; }

        /* 에디터 텍스트 영역 */
        textarea {
            flex: 1; width: 100%; background: rgba(0,0,0,0.3); color: #fff;
            border: 1px solid var(--theme-dim); padding: 1rem; border-radius: 4px;
            font-family: inherit; font-size: 1rem; line-height: 1.6; resize: none; outline: none;
        }
        textarea:focus { border-color: var(--theme-color); box-shadow: 0 0 10px var(--theme-dim); }
    </style>
</head>
<body>

    <script>
        // 기본 설정값 (로컬 스토리지에 데이터가 없을 때만 사용됨)
        const SITE_CONFIG = {
            defaultSubjectName: "실험체: 혜레",
            defaultImageUrl: "https://via.placeholder.com/300x150/050a0f/5ae7ef?text=SUBJECT_IMG", 
            introTypingTexts: [
                "ESTABLISHING SECURE CONNECTION...",
                "LOADING CLASSIFIED DATA...",
                "연구 일지를 열람하시겠습니까?"
            ],
            categories: [
                { name: "HOME", sub: [] },
                { name: "ARCHIVE", sub: ["관찰 기록", "폐기된 데이터"] },
                { name: "TRPG LOG", sub: ["Session 1", "Session 2"] }
            ],
            masterPassword: "123" // 관리자 비밀번호
        };
    </script>

    <div class="mainframe-panel">
        <aside class="sidebar">
            <div class="header-info" id="subject-display">SUBJECT_NAME</div>
            <nav class="nav-menu" id="menu-container"></nav>

            <div class="bottom-widgets">
                <div class="sidebar-image-container">
                    <img id="sidebar-img" src="" alt="Sidebar Image">
                </div>
                <div class="sys-time-box">
                    [ SYS TIME ] <span id="clock-display">00:00:00</span>
                </div>
                <button class="settings-btn" onclick="openSettings()">[ SYSTEM SETTINGS ]</button>
                <button id="auth-btn" class="auth-btn" onclick="toggleLogin()">[ ADMIN LOGIN ]</button>
            </div>
        </aside>

        <main class="content-area">
            <div class="intro-screen" id="intro-box">
                <div class="intro-text-area"><span id="typing-output"></span><span class="cursor"></span></div>
                <div class="btn-group" id="intro-btns">
                    <button class="btn" id="btn-yes">YES</button>
                    <button class="btn" id="btn-no">NO</button>
                </div>
            </div>

            <div class="data-viewer" id="data-box">
                <div class="content-header">
                    <div class="content-title-area"><h2 id="content-title">CATEGORY</h2></div>
                    <div class="admin-controls">
                        <button class="admin-btn" onclick="openEditor()">EDIT</button>
                        <button class="admin-btn" onclick="deleteData()">DELETE</button>
                    </div>
                </div>
                <div class="content-body" id="content-body">데이터를 불러오는 중입니다...</div>
            </div>

            <div class="data-editor" id="editor-box">
                <div class="content-header">
                    <div class="content-title-area"><h2 id="editor-title">EDIT MODE</h2></div>
                    <div class="admin-controls" style="display:flex;">
                        <button class="admin-btn" style="background:var(--theme-color); color:#000;" onclick="saveData()">SAVE</button>
                        <button class="admin-btn" onclick="closeEditor()">CANCEL</button>
                    </div>
                </div>
                <textarea id="editor-textarea" placeholder="여기에 내용을 작성하세요..."></textarea>
            </div>
        </main>
    </div>

    <script>
        let isLoggedIn = false;
        let currentCategory = ""; // 현재 보고 있는 카테고리 기억

        function init() {
            // 로컬 스토리지에서 이름과 이미지 불러오기 (없으면 기본값)
            const savedSubject = localStorage.getItem('erg_subject') || SITE_CONFIG.defaultSubjectName;
            const savedImage = localStorage.getItem('erg_image') || SITE_CONFIG.defaultImageUrl;
            
            document.getElementById('subject-display').innerText = savedSubject;
            document.getElementById('sidebar-img').src = savedImage;
            
            renderMenu();
            startClock();
            startTypingEffect();
        }

        /* -- UI 변경 설정 (관리자 전용) -- */
        function openSettings() {
            // 1. 실험체 이름 수정
            const currentName = document.getElementById('subject-display').innerText;
            const newName = prompt("새로운 메인 타이틀(실험체 이름)을 입력하세요:", currentName);
            if (newName) {
                localStorage.setItem('erg_subject', newName);
                document.getElementById('subject-display').innerText = newName;
            }

            // 2. 이미지 URL 수정
            const currentImg = document.getElementById('sidebar-img').src;
            const newImg = prompt("새로운 사이드바 이미지 URL 주소를 입력하세요:\n(웹에 올라가 있는 이미지 링크여야 합니다.)", currentImg);
            if (newImg) {
                localStorage.setItem('erg_image', newImg);
                document.getElementById('sidebar-img').src = newImg;
            }
        }

        /* -- 글쓰기 / 에디터 기능 -- */
        function loadContent(title) {
            currentCategory = title;
            document.getElementById('intro-box').style.display = 'none';
            document.getElementById('editor-box').style.display = 'none';
            document.getElementById('data-box').style.display = 'flex';
            
            document.getElementById('content-title').innerText = title;
            
            // 로컬 스토리지에서 해당 카테고리의 글 불러오기
            const savedData = localStorage.getItem('erg_post_' + title);
            if (savedData) {
                document.getElementById('content-body').innerText = savedData;
            } else {
                document.getElementById('content-body').innerHTML = `[ ${title} ] 데이터베이스 기록이 없습니다.<br><br>관리자 로그인 후 우측 상단의 [EDIT] 버튼을 눌러 새 글을 작성하세요.`;
            }
        }

        function openEditor() {
            document.getElementById('data-box').style.display = 'none';
            document.getElementById('editor-box').style.display = 'flex';
            document.getElementById('editor-title').innerText = "EDIT: " + currentCategory;
            
            const savedData = localStorage.getItem('erg_post_' + currentCategory);
            document.getElementById('editor-textarea').value = savedData ? savedData : "";
        }

        function saveData() {
            const content = document.getElementById('editor-textarea').value;
            // 로컬 스토리지에 저장 (새로고침해도 유지됨)
            localStorage.setItem('erg_post_' + currentCategory, content);
            alert("데이터가 안전하게 저장되었습니다.");
            loadContent(currentCategory); // 저장 후 뷰어로 복귀
        }

        function closeEditor() {
            loadContent(currentCategory);
        }

        function deleteData() {
            if(confirm(`[ ${currentCategory} ] 의 데이터를 정말 삭제하시겠습니까?`)) {
                localStorage.removeItem('erg_post_' + currentCategory);
                loadContent(currentCategory);
            }
        }

        /* -- 기존 기능들 유지 -- */
        function renderMenu() {
            const container = document.getElementById('menu-container');
            SITE_CONFIG.categories.forEach((cat) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                const parentTitle = document.createElement('span');
                parentTitle.className = 'parent-cat';
                parentTitle.innerText = `> ${cat.name}`;
                parentTitle.onclick = () => {
                    itemDiv.classList.toggle('open');
                    if(cat.sub.length === 0) loadContent(cat.name);
                };
                itemDiv.appendChild(parentTitle);

                if (cat.sub.length > 0) {
                    const subList = document.createElement('div');
                    subList.className = 'sub-cat-list';
                    cat.sub.forEach(sub => {
                        const subItem = document.createElement('span');
                        subItem.className = 'sub-cat';
                        subItem.innerText = "- " + sub;
                        subItem.onclick = () => loadContent(`${cat.name} - ${sub}`);
                        subList.appendChild(subItem);
                    });
                    itemDiv.appendChild(subList);
                }
                container.appendChild(itemDiv);
            });
        }

        function toggleLogin() {
            const authBtn = document.getElementById('auth-btn');
            if (isLoggedIn) {
                isLoggedIn = false;
                document.body.classList.remove('is-admin');
                authBtn.innerText = "[ ADMIN LOGIN ]";
                alert("로그아웃 되었습니다.");
            } else {
                const pwd = prompt("SYSTEM ADMIN PASSWORD를 입력하세요:");
                if (pwd === SITE_CONFIG.masterPassword) {
                    isLoggedIn = true;
                    document.body.classList.add('is-admin');
                    authBtn.innerText = "[ LOGOUT ]";
                } else if (pwd !== null) {
                    alert("비밀번호가 일치하지 않습니다.");
                }
            }
        }

        let typeLineIdx = 0, typeCharIdx = 0;
        function startTypingEffect() {
            const output = document.getElementById('typing-output');
            if (typeLineIdx < SITE_CONFIG.introTypingTexts.length) {
                let currentLine = SITE_CONFIG.introTypingTexts[typeLineIdx];
                if (typeCharIdx < currentLine.length) {
                    output.innerHTML += currentLine.charAt(typeCharIdx);
                    typeCharIdx++;
                    setTimeout(startTypingEffect, 40);
                } else {
                    output.innerHTML += "<br>";
                    typeLineIdx++;
                    typeCharIdx = 0;
                    setTimeout(startTypingEffect, 500);
                }
            } else {
                document.getElementById('intro-btns').style.display = 'flex';
            }
        }

        document.getElementById('btn-yes').onclick = () => { loadContent("HOME"); };
        document.getElementById('btn-no').onclick = () => { document.getElementById('typing-output').innerHTML = "SYSTEM TERMINATED."; document.getElementById('intro-btns').style.display = 'none'; };

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-display').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            }, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
