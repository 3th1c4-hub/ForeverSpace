<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        @font-face {
            font-family: 'Artemis';
            src: url('./Artemis.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --theme-color: #5b73d6;
            --theme-glow: rgba(91, 115, 214, 0.4);
            --bg-color: #050810;
            --panel-bg: rgba(10, 14, 25, 0.75);
            --text-main: #d0d8e8;
            --text-muted: #6b7a99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Artemis', 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070');
            background-size: cover; background-position: center;
            color: var(--text-main); height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            backdrop-filter: brightness(0.4);
        }

        .mainframe {
            width: 85vw; max-width: 1100px; height: 80vh;
            background: var(--panel-bg); border: 1px solid var(--theme-color);
            border-radius: 12px; box-shadow: 0 0 30px var(--theme-glow), inset 0 0 20px var(--theme-glow);
            backdrop-filter: blur(15px); display: flex; flex-direction: column; position: relative;
        }

        /* 상단 헤더 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid rgba(91, 115, 214, 0.2); }
        .subject-name { font-size: 0.95rem; color: var(--text-muted); letter-spacing: 1px; font-weight: bold; }
        
        .bgm-controls { display: flex; align-items: center; gap: 10px; color: var(--theme-color); font-size: 0.8rem; }
        .bgm-slider { width: 80px; height: 3px; background: var(--text-muted); appearance: none; outline: none; }
        .bgm-slider::-webkit-slider-thumb { appearance: none; width: 8px; height: 8px; background: var(--theme-color); border-radius: 50%; cursor: pointer; }
        .bgm-btn { background: none; border: none; color: var(--theme-color); cursor: pointer; font-size: 1rem; }

        /* 하단 레이아웃 */
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* (1), (3), (5) 사이드바 카테고리 메뉴 */
        .sidebar { width: 240px; border-right: 1px solid rgba(91, 115, 214, 0.2); padding: 2rem 1.5rem; display: flex; flex-direction: column; justify-content: space-between; }
        .nav-menu { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
        .menu-group { margin-bottom: 0.5rem; }
        .parent-cat { color: var(--text-muted); font-size: 0.95rem; cursor: pointer; transition: 0.2s; letter-spacing: 1px; display: block; padding: 0.2rem 0; }
        .parent-cat:hover, .parent-cat.active { color: var(--theme-color); font-weight: bold; text-shadow: 0 0 8px var(--theme-glow); }
        .sub-cat-list { display: none; padding-left: 1rem; border-left: 1px solid var(--theme-glow); margin-left: 0.5rem; margin-top: 0.5rem; }
        .menu-group.open .sub-cat-list { display: block; }
        .sub-cat { display: block; color: #8899a6; font-size: 0.85rem; padding: 0.3rem 0; cursor: pointer; }
        .sub-cat:hover, .sub-cat.active { color: var(--theme-color); }

        .bottom-info { text-align: center; }
        .sidebar-img { width: 100%; height: 100px; background: #000; border: 1px solid var(--theme-glow); margin-bottom: 1rem; object-fit: cover; border-radius: 4px; }
        .sys-time { border: 1px dashed var(--theme-glow); padding: 0.5rem; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; letter-spacing: 2px; }
        .login-btn { width: 100%; padding: 0.5rem; background: transparent; color: var(--theme-color); border: 1px solid var(--theme-color); border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; transition: 0.3s; }
        .login-btn:hover { background: var(--theme-color); color: #000; }

        /* 콘텐츠 영역 */
        .content-area { flex: 1; padding: 2rem 3rem; overflow-y: auto; display: flex; flex-direction: column; }
        .view-title { font-size: 1.5rem; color: var(--theme-color); margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }

        .write-section { display: none; background: rgba(0,0,0,0.3); padding: 1.5rem; border: 1px solid var(--theme-glow); border-radius: 8px; margin-bottom: 2rem; }
        .is-admin .write-section { display: block; }
        .write-input, .write-select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--theme-glow); color: #fff; font-family: inherit; font-size: 0.9rem; padding: 0.5rem; margin-bottom: 1rem; outline: none; }
        .write-textarea { width: 100%; height: 80px; background: rgba(0,0,0,0.5); border: 1px solid var(--theme-glow); color: #fff; font-family: inherit; font-size: 0.9rem; padding: 0.5rem; margin-bottom: 1rem; outline: none; resize: none; }
        .submit-btn { padding: 0.5rem 1.5rem; background: var(--theme-color); color: #000; border: none; cursor: pointer; font-family: inherit; border-radius: 3px; font-weight: bold; }

        .post-list { display: flex; flex-direction: column; }
        .post-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 1.5rem 0; position: relative; }
        .post-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .post-title { font-size: 1.2rem; color: #fff; margin-bottom: 0.5rem; font-weight: normal; }
        .post-excerpt { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; white-space: pre-wrap; }
        
        .admin-controls { position: absolute; right: 0; top: 1.5rem; display: none; }
        .is-admin .admin-controls { display: block; }
        .del-btn { background: transparent; border: 1px solid #ff4a4a; color: #ff4a4a; padding: 0.2rem 0.5rem; font-size: 0.7rem; cursor: pointer; border-radius: 3px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--theme-glow); border-radius: 3px; }
    </style>
</head>
<body>

    <script>
        const SITE_CONFIG = {
            // (2) 사이트 이름 및 메인 타이틀 설정
            siteTitle: "PROJECT: ERG ARCHIVE",
            subjectName: "실험체: 혜레", 
            
            // (4) 사이트 BGM 설정 (mp3 파일 주소 입력)
            bgmUrl: "YOUR_BGM_FILE.mp3", 

            // (1), (3), (5) 카테고리 및 하위 카테고리 설정
            // sub 배열에 하위 카테고리를 적으면 자동으로 메뉴가 생성됩니다.
            categories: [
                { name: "HOME", sub: [] },
                { name: "ARCHIVE", sub: ["엘백도", "태칸", "메이레스", "관찰 기록"] },
                { name: "TRPG LOG", sub: ["Session 1", "Session 2"] },
                { name: "GALLERY", sub: [] },
                { name: "GUESTBOOK", sub: [] }
            ]
        };
    </script>

    <audio id="bgm" loop></audio>

    <div class="mainframe">
        <header class="top-bar">
            <div class="subject-name" id="display-subject">SUBJECT_NAME</div>
            <div class="bgm-controls">
                <span>BGM</span>
                <input type="range" class="bgm-slider" id="bgm-vol" min="0" max="1" step="0.01" value="0.5">
                <button class="bgm-btn" id="bgm-play">▶</button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <nav class="nav-menu" id="nav-container">
                    </nav>

                <div class="bottom-info">
                    <img src="https://via.placeholder.com/200x100/0a0e19/5b73d6?text=IMAGE" class="sidebar-img" alt="Sidebar Img">
                    <div class="sys-time">[ SYSTEM TIME ]<br><span id="clock">00 : 00 : 00</span></div>
                    <button class="login-btn" id="auth-btn" onclick="handleLogin()">LOGIN</button>
                </div>
            </aside>

            <main class="content-area">
                <h2 class="view-title" id="current-view-title">ALL POSTS</h2>

                <div class="write-section">
                    <div style="display: flex; gap: 10px;">
                        <select id="post-category" class="write-select" style="flex: 1;">
                            </select>
                        <input type="date" id="post-date" class="write-input" style="flex: 1;">
                    </div>
                    <input type="text" id="post-title" class="write-input" placeholder="제목을 입력하세요">
                    <textarea id="post-content" class="write-textarea" placeholder="내용을 입력하세요..."></textarea>
                    <button class="submit-btn" onclick="savePost()">POST RECORD</button>
                </div>

                <div class="post-list" id="post-container">
                    <div style="color:var(--text-muted); text-align:center; padding: 2rem;">데이터를 동기화 중입니다...</div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- 1. 환경 설정 적용 ---
        document.title = SITE_CONFIG.siteTitle;
        document.getElementById('display-subject').innerText = SITE_CONFIG.subjectName;
        document.getElementById('bgm').src = SITE_CONFIG.bgmUrl;

        let currentFilter = "ALL"; // 현재 선택된 카테고리 필터
        let allPostsData = [];     // 파이어베이스에서 불러온 모든 글 캐싱

        // --- 2. 카테고리 메뉴 생성 ---
        function renderMenu() {
            const nav = document.getElementById('nav-container');
            const catSelect = document.getElementById('post-category');
            
            nav.innerHTML = `<div class="menu-group"><span class="parent-cat active" onclick="setFilter('ALL')">> VIEW ALL</span></div>`;
            catSelect.innerHTML = `<option value="">-- 카테고리 선택 --</option>`;

            SITE_CONFIG.categories.forEach(cat => {
                // 네비게이션 생성
                const group = document.createElement('div');
                group.className = 'menu-group';
                
                const parent = document.createElement('span');
                parent.className = 'parent-cat';
                parent.innerText = `> ${cat.name}`;
                parent.onclick = () => {
                    group.classList.toggle('open');
                    setFilter(cat.name);
                };
                group.appendChild(parent);

                // 글쓰기 드롭다운 옵션 추가 (부모)
                if (cat.name !== "HOME") {
                    catSelect.innerHTML += `<option value="${cat.name}">[${cat.name}]</option>`;
                }

                // 서브 카테고리 생성
                if (cat.sub.length > 0) {
                    const subList = document.createElement('div');
                    subList.className = 'sub-cat-list';
                    cat.sub.forEach(sub => {
                        const subItem = document.createElement('span');
                        subItem.className = 'sub-cat';
                        subItem.innerText = `- ${sub}`;
                        subItem.onclick = (e) => {
                            e.stopPropagation(); // 부모 클릭 이벤트 방지
                            setFilter(sub);
                        };
                        subList.appendChild(subItem);
                        
                        // 글쓰기 드롭다운 옵션 추가 (자식)
                        catSelect.innerHTML += `<option value="${sub}">ㄴ ${sub}</option>`;
                    });
                    group.appendChild(subList);
                }
                nav.appendChild(group);
            });
        }

        // --- 3. 카테고리 필터링 렌더링 ---
        function setFilter(categoryName) {
            currentFilter = categoryName;
            document.getElementById('current-view-title').innerText = categoryName === "ALL" ? "ALL POSTS" : `CATEGORY : ${categoryName}`;
            renderPosts(); // 화면 다시 그리기
        }

        function renderPosts() {
            const container = document.getElementById('post-container');
            container.innerHTML = '';

            const filteredPosts = currentFilter === "ALL" 
                ? allPostsData 
                : allPostsData.filter(post => post.category === currentFilter || post.parentCategory === currentFilter);

            if (filteredPosts.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 2rem; color:#555;">[ ${currentFilter} ] 에 해당하는 기록이 없습니다.</div>`;
                return;
            }

            filteredPosts.forEach(data => {
                container.innerHTML += `
                    <div class="post-item">
                        <div class="post-meta">
                            <span style="color: var(--theme-color);">${data.category}</span>
                            <span>${data.date}</span>
                        </div>
                        <h3 class="post-title">${data.title}</h3>
                        <p class="post-excerpt">${data.content}</p>
                        <div class="admin-controls">
                            <button class="del-btn" onclick="deletePost('${data.id}')">삭제</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- 파이어베이스 연동 로직 (이전 코드와 동일, 반드시 정보 입력 필요!) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 실시간 데이터 불러오기
        db.collection("archive").orderBy("date", "desc").onSnapshot((snapshot) => {
            allPostsData = [];
            snapshot.forEach((doc) => {
                allPostsData.push({ id: doc.id, ...doc.data() });
            });
            renderPosts();
        }, (error) => {
            console.error("Firebase 오류:", error);
            document.getElementById('post-container').innerHTML = `<div style="color:#ff4a4a; padding: 2rem;">Firebase 설정을 확인하세요.</div>`;
        });

        // 새 글 저장
        function savePost() {
            const category = document.getElementById('post-category').value;
            const date = document.getElementById('post-date').value;
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;

            if(!category || !title || !content) return alert("카테고리, 제목, 내용을 모두 입력하세요.");

            db.collection("archive").add({
                category: category,
                date: date || new Date().toISOString().split('T')[0],
                title: title,
                content: content,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('post-title').value = '';
                document.getElementById('post-content').value = '';
                alert("기록이 성공적으로 업로드되었습니다.");
            }).catch(error => alert("작성 실패: " + error.message));
        }

        function deletePost(docId) {
            if(confirm("이 기록을 데이터베이스에서 영구 삭제하시겠습니까?")) {
                db.collection("archive").doc(docId).delete();
            }
        }

        // --- 로그인 & 부가 기능 ---
        const authBtn = document.getElementById('auth-btn');
        auth.onAuthStateChanged((user) => {
            if (user) { document.body.classList.add('is-admin'); authBtn.innerText = "LOGOUT"; } 
            else { document.body.classList.remove('is-admin'); authBtn.innerText = "LOGIN"; }
        });

        function handleLogin() {
            if (auth.currentUser) auth.signOut();
            else {
                const email = prompt("관리자 이메일을 입력하세요:");
                const pwd = prompt("비밀번호를 입력하세요:");
                if(email && pwd) auth.signInWithEmailAndPassword(email, pwd).catch(e => alert("로그인 실패: " + e.message));
            }
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = `${String(now.getHours()).padStart(2, '0')} : ${String(now.getMinutes()).padStart(2, '0')} : ${String(now.getSeconds()).padStart(2, '0')}`;
        }, 1000);

        const bgm = document.getElementById('bgm');
        const playBtn = document.getElementById('bgm-play');
        let isPlaying = false;
        playBtn.onclick = () => {
            if(isPlaying) { bgm.pause(); playBtn.innerText = "▶"; } 
            else { bgm.play(); playBtn.innerText = "⏸"; }
            isPlaying = !isPlaying;
        };
        document.getElementById('bgm-vol').oninput = (e) => { bgm.volume = e.target.value; };

        // 초기화 실행
        renderMenu();
    </script>
</body>
</html>
